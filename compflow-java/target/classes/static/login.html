<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompFlow - Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #1b3a6b;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .card {
        background: #fff;
        border-radius: 1.5rem;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        padding: 2rem;
        width: 100%;
        max-width: 26rem;
      }
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2rem;
      }
      .logo-box {
        width: 64px;
        height: 64px;
        background: #1b3a6b;
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
      }
      .logo-box svg {
        width: 36px;
        height: 36px;
        stroke: white;
      }
      .brand h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1b3a6b;
      }
      .brand p {
        font-size: 0.875rem;
        color: #9e9e9e;
        margin-top: 0.25rem;
      }
      .form {
        display: flex;
        flex-direction: column;
        gap: 1.125rem;
      }
      label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #1b3a6b;
        display: block;
        margin-bottom: 0.375rem;
      }
      input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1.5px solid #e5e7eb;
        border-radius: 0.75rem;
        font-size: 0.9375rem;
        outline: none;
        font-family: inherit;
        transition: 0.2s;
        color: #1f2937;
      }
      input:focus {
        border-color: #1b3a6b;
        box-shadow: 0 0 0 3px rgba(27, 58, 107, 0.1);
      }
      input::placeholder {
        color: #c0c4c8;
      }
      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 2.75rem;
      }
      .pw-toggle {
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #9e9e9e;
        display: flex;
        align-items: center;
        padding: 0.25rem;
      }
      .pw-toggle:hover {
        color: #1b3a6b;
      }
      .btn {
        width: 100%;
        background: #1b3a6b;
        color: white;
        border: none;
        border-radius: 0.75rem;
        padding: 0.875rem;
        font-size: 0.9375rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 0.25rem;
        font-family: inherit;
      }
      .btn:hover {
        background: #0f2c52;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .alert {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        font-weight: 500;
      }
      .alert-error {
        background: #fde8e8;
        color: #c62828;
        border: 1px solid #fca5a5;
      }
      .footer-text {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #9e9e9e;
      }
      .footer-text a {
        color: #2e7d32;
        font-weight: 700;
        text-decoration: none;
        margin-left: 0.25rem;
      }
      .footer-text a:hover {
        text-decoration: underline;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="logo-box">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />
          </svg>
        </div>
        <h1>CompFlow</h1>
        <p>Planejamento Acadêmico UFPEL</p>
      </div>

      <div id="alertErro" class="alert alert-error hidden"></div>

      <form class="form" onsubmit="entrar(event)">
        <div>
          <label for="email">E-mail institucional</label>
          <input
            type="email"
            id="email"
            placeholder="seu.email@inf.ufpel.edu.br"
            required
            autocomplete="email"
          />
        </div>
        <div>
          <label for="senha">Senha</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="senha"
              placeholder="Digite sua senha"
              required
              autocomplete="current-password"
            />
            <button type="button" class="pw-toggle" onclick="toggleSenha()">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn" id="btnEntrar">Entrar</button>
      </form>

      <p class="footer-text">
        Não tem uma conta?<a href="criarconta.html">Criar conta</a>
      </p>
    </div>

    <script>
      const BASE = "http://localhost:8080/api";

      function toggleSenha() {
        const input = document.getElementById("senha");
        input.type = input.type === "password" ? "text" : "password";
      }

      function mostrarErro(msg) {
        const el = document.getElementById("alertErro");
        el.textContent = msg;
        el.classList.remove("hidden");
      }

      // POST /api/auth/login
      async function entrar(e) {
        e.preventDefault();
        const btn = document.getElementById("btnEntrar");
        btn.disabled = true;
        btn.textContent = "Entrando...";
        document.getElementById("alertErro").classList.add("hidden");

        try {
          const res = await fetch(`${BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: document.getElementById("email").value,
              senha: document.getElementById("senha").value,
            }),
          });

          if (!res.ok) throw new Error("inválido");

          const usuario = await res.json();
          localStorage.setItem("usuario", JSON.stringify(usuario));

          window.location.href =
            usuario.role === "ADMIN"
              ? "admin-dashboard.html"
              : "dashboard.html";
        } catch {
          mostrarErro("E-mail ou senha inválidos.");
          btn.disabled = false;
          btn.textContent = "Entrar";
        }
      }
    </script>
  </body>
</html>
