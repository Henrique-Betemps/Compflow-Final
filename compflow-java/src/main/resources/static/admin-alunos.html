<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompFlow - Alunos</title>
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo">CompFlow</div>
        <div class="sidebar-label">Painel Administrativo</div>
        <nav class="menu">
          <a href="admin-dashboard.html"
            ><i class="fa-solid fa-house"></i> Dashboard</a
          >
          <a href="admin-disciplinas.html"
            ><i class="fa-solid fa-book"></i> Disciplinas</a
          >
          <a href="admin-eventos.html"
            ><i class="fa-regular fa-calendar"></i> Eventos</a
          >
          <a href="admin-contatos.html"
            ><i class="fa-solid fa-users"></i> Contatos</a
          >
          <a href="admin-curriculos.html"
            ><i class="fa-solid fa-graduation-cap"></i> Currículos</a
          >
          <a href="admin-alunos.html" class="active"
            ><i class="fa-solid fa-user-graduate"></i> Alunos</a
          >
        </nav>
        <div class="sidebar-footer">
          <div class="user-box">
            <div class="avatar" id="avatarSidebar">A</div>
            <div class="user-info">
              <h4 id="nomeSidebar">Admin</h4>
              <span>Administrador</span>
            </div>
            <a href="admin-perfil.html"
              ><i
                class="fa-solid fa-gear"
                style="color: white; font-size: 14px"
              ></i
            ></a>
          </div>
          <a href="#" class="logout" onclick="sair()"
            ><i class="fa-solid fa-chevron-left"></i> Sair</a
          >
        </div>
      </aside>

      <main class="content">
        <div class="page-header">
          <div>
            <h1>Alunos</h1>
            <p>
              Escolha qual currículo (grade de disciplinas) aparece para cada
              aluno
            </p>
          </div>
        </div>

        <div class="card">
          <div class="toolbar">
            <div class="search-wrap">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                type="text"
                id="busca"
                placeholder="Buscar por nome ou e-mail..."
                oninput="renderTabela()"
              />
            </div>
            <select
              class="filter-select"
              id="filtroCurriculo"
              onchange="renderTabela()"
            >
              <option value="">Todos os currículos</option>
              <option value="SEM">Sem currículo definido</option>
            </select>
          </div>
          <div class="table-count" id="count"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>E-mail</th>
                  <th>Curso</th>
                  <th>Currículo Atual</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr>
                  <td
                    colspan="5"
                    style="text-align: center; color: #aaa; padding: 30px"
                  >
                    Carregando...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal: escolher currículo do aluno -->
    <div
      class="modal-overlay hidden"
      id="modalOverlay"
      onclick="fecharSeForaModal(event)"
    >
      <div class="modal">
        <h3 id="modalTitulo">Definir Currículo do Aluno</h3>
        <div
          id="modalAlert"
          style="
            display: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            background: #fde8e8;
            color: #c62828;
          "
        ></div>

        <p
          id="alunoSelecionadoInfo"
          style="font-size: 13px; color: #777; margin-bottom: 14px"
        ></p>

        <div class="form-group">
          <label>Currículo</label>
          <select id="fCurriculo">
            <option value="">Carregando currículos...</option>
          </select>
        </div>

        <div class="modal-footer">
          <button class="btn-cancel-modal" onclick="fecharModal()">
            Cancelar
          </button>
          <button class="btn-primary" id="btnSalvar" onclick="salvar()">
            Salvar
          </button>
        </div>
      </div>
    </div>

    <script>
      const BASE = "/api";
      const usuario = JSON.parse(localStorage.getItem("usuario"));
      if (!usuario || usuario.role !== "ADMIN")
        window.location.href = "login.html";

      document.getElementById("nomeSidebar").textContent = usuario.nome;
      document.getElementById("avatarSidebar").textContent =
        usuario.nome[0].toUpperCase();
      function sair() {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
      }

      let alunos = [];
      let curriculos = [];
      let alunoSelecionadoId = null;

      // GET /api/usuarios  +  GET /api/curriculos
      async function carregar() {
        try {
          const [resUsuarios, resCurriculos] = await Promise.all([
            fetch(`${BASE}/usuarios`),
            fetch(`${BASE}/curriculos`),
          ]);
          const todos = await resUsuarios.json();
          alunos = todos.filter((u) => u.role === "ALUNO");
          curriculos = await resCurriculos.json();

          montarFiltroCurriculos();
          renderTabela();
        } catch {
          document.getElementById("tbody").innerHTML =
            '<tr><td colspan="5" style="color:#e53935;text-align:center;padding:20px;">Erro ao carregar. Verifique se a API está rodando.</td></tr>';
        }
      }

      function montarFiltroCurriculos() {
        const sel = document.getElementById("filtroCurriculo");
        const valorAtual = sel.value;
        sel.innerHTML =
          '<option value="">Todos os currículos</option>' +
          '<option value="SEM">Sem currículo definido</option>' +
          curriculos
            .map((c) => `<option value="${c.id}">${c.nome}</option>`)
            .join("");
        sel.value = valorAtual;
      }

      function renderTabela() {
        const busca = document.getElementById("busca").value.toLowerCase();
        const filtroCurr = document.getElementById("filtroCurriculo").value;

        let lista = alunos;
        if (busca)
          lista = lista.filter(
            (a) =>
              a.nome.toLowerCase().includes(busca) ||
              a.email.toLowerCase().includes(busca),
          );
        if (filtroCurr === "SEM") {
          lista = lista.filter((a) => !a.curriculoId);
        } else if (filtroCurr) {
          lista = lista.filter((a) => String(a.curriculoId) === filtroCurr);
        }

        document.getElementById("count").textContent =
          `Lista de Alunos (${lista.length})`;

        document.getElementById("tbody").innerHTML = lista.length
          ? lista
              .map(
                (a) => `
      <tr>
        <td style="font-weight:600;">${a.nome}</td>
        <td style="color:#555;">${a.email}</td>
        <td style="color:#555;">${a.nomeCurso || "—"}</td>
        <td>
          ${
            a.nomeCurriculo
              ? `<span class="badge badge-academico">${a.nomeCurriculo}</span>`
              : `<span class="badge badge-prazo">Não definido</span>`
          }
        </td>
        <td><div class="tbl-actions">
          <button class="btn-icon btn-edit" onclick="abrirModal(${a.id})" title="Definir currículo">
            <i class="fa-solid fa-graduation-cap"></i>
          </button>
        </div></td>
      </tr>`,
              )
              .join("")
          : '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px;">Nenhum aluno encontrado.</td></tr>';
      }

      function abrirModal(alunoId) {
        alunoSelecionadoId = alunoId;
        const aluno = alunos.find((a) => a.id === alunoId);

        document.getElementById("alunoSelecionadoInfo").textContent =
          `${aluno.nome} — ${aluno.email}`;

        const sel = document.getElementById("fCurriculo");
        sel.innerHTML =
          '<option value="">Nenhum (sem currículo)</option>' +
          curriculos
            .map((c) => `<option value="${c.id}">${c.nome}</option>`)
            .join("");
        sel.value = aluno.curriculoId || "";

        document.getElementById("modalAlert").style.display = "none";
        document.getElementById("modalOverlay").classList.remove("hidden");
      }

      function fecharModal() {
        document.getElementById("modalOverlay").classList.add("hidden");
        alunoSelecionadoId = null;
      }
      function fecharSeForaModal(e) {
        if (e.target === e.currentTarget) fecharModal();
      }

      // PATCH /api/usuarios/{id}/curriculo
      async function salvar() {
        const curriculoId = document.getElementById("fCurriculo").value;
        const btn = document.getElementById("btnSalvar");
        btn.disabled = true;
        btn.textContent = "Salvando...";

        try {
          const res = await fetch(
            `${BASE}/usuarios/${alunoSelecionadoId}/curriculo`,
            {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                curriculoId: curriculoId ? Number(curriculoId) : null,
              }),
            },
          );
          if (!res.ok) throw new Error();
          fecharModal();
          carregar();
        } catch {
          const al = document.getElementById("modalAlert");
          al.textContent = "Erro ao salvar. Tente novamente.";
          al.style.display = "block";
        } finally {
          btn.disabled = false;
          btn.textContent = "Salvar";
        }
      }

      carregar();
    </script>
  </body>
</html>
