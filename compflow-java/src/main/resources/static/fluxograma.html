<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompFlow - Fluxograma</title>
    <link rel="stylesheet" href="sidebar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .flux-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .flux-header h1 {
        color: #173d7a;
        font-size: 18px;
        margin-bottom: 4px;
      }
      .flux-header p {
        color: #777;
        font-size: 13px;
      }
      .filter-btns {
        display: flex;
        gap: 8px;
      }
      .fbtn {
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        transition: 0.2s;
        background: #e8eaf0;
        color: #555;
        font-family: inherit;
      }
      .fbtn.active {
        background: #173d7a;
        color: white;
      }
      .fbtn:hover:not(.active) {
        background: #d0d4e0;
      }
      .flux-scroll {
        overflow-x: auto;
        padding-bottom: 12px;
      }
      .flux-scroll::-webkit-scrollbar {
        height: 6px;
      }
      .flux-scroll::-webkit-scrollbar-thumb {
        background: #b0b8cc;
        border-radius: 4px;
      }
      .flux-grid {
        display: flex;
        gap: 14px;
        min-width: max-content;
        padding: 4px 2px;
      }
      .flux-col {
        width: 196px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sem-header {
        background: #173d7a;
        color: white;
        text-align: center;
        font-weight: 700;
        font-size: 13px;
        padding: 10px;
        border-radius: 10px;
      }
      .disc {
        border-radius: 10px;
        padding: 11px 12px;
        cursor: pointer;
        transition: 0.15s;
        user-select: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .disc:hover {
        opacity: 0.82;
        transform: scale(1.02);
      }
      .disc.aprovado {
        background: #47b84f;
        color: white;
      }
      .disc.liberado {
        background: #2f67d8;
        color: white;
      }
      .disc.bloqueado {
        background: #e53935;
        color: white;
        opacity: 0.72;
        cursor: not-allowed;
      }
      .disc-nome {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        line-height: 1.3;
      }
      .disc-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .disc-cod {
        font-size: 10px;
        opacity: 0.8;
      }
      .disc-cr {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 5px;
        padding: 1px 7px;
        font-size: 12px;
        font-weight: 700;
      }
      .legenda {
        display: flex;
        gap: 22px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      .leg {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #555;
      }
      .leg-box {
        width: 14px;
        height: 14px;
        border-radius: 4px;
      }
      .loading {
        text-align: center;
        color: #aaa;
        padding: 40px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo">CompFlow</div>
        <nav class="menu">
          <a href="dashboard.html"><i class="fa-solid fa-house"></i> Início</a>
          <a href="meuprogresso.html"
            ><i class="fa-solid fa-award"></i> Meu Progresso</a
          >
          <a href="fluxograma.html" class="active"
            ><i class="fa-solid fa-arrow-trend-up"></i> Fluxograma</a
          >
          <a href="calendario.html"
            ><i class="fa-regular fa-calendar"></i> Calendário</a
          >
          <a href="contatos.html"><i class="fa-solid fa-users"></i> Contatos</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-box">
            <div class="avatar" id="avatarSidebar">U</div>
            <div class="user-info">
              <h4 id="nomeSidebar"></h4>
              <span id="cursoSidebar"></span>
            </div>
            <a href="perfil.html"
              ><i
                class="fa-solid fa-gear"
                style="color: white; font-size: 14px"
              ></i
            ></a>
          </div>
          <a href="#" class="logout" onclick="sair()"
            ><i class="fa-solid fa-chevron-left"></i> Sair</a
          >
        </div>
      </aside>

      <main class="content">
        <div class="flux-header">
          <div>
            <h1 id="tituloFlux">Fluxograma</h1>
            <p>Clique em uma disciplina para marcar/desmarcar como concluída</p>
          </div>
          <div class="filter-btns">
            <button class="fbtn active" onclick="filtrar('todas', this)">
              Todas
            </button>
            <button class="fbtn" onclick="filtrar('aprovadas', this)">
              Aprovadas
            </button>
            <button class="fbtn" onclick="filtrar('pendentes', this)">
              Pendentes
            </button>
          </div>
        </div>

        <div id="fluxArea">
          <div class="loading">Carregando fluxograma...</div>
        </div>

        <div class="legenda">
          <div class="leg">
            <div class="leg-box" style="background: #47b84f"></div>
            <span id="cntAp">0</span> Aprovado
          </div>
          <div class="leg">
            <div class="leg-box" style="background: #2f67d8"></div>
            <span id="cntLib">0</span> Liberado
          </div>
          <div class="leg">
            <div class="leg-box" style="background: #e53935"></div>
            <span id="cntBl">0</span> Bloqueado
          </div>
        </div>
      </main>
    </div>

    <script>
      const BASE = "http://localhost:8080/api";
      const usuario = JSON.parse(localStorage.getItem("usuario"));
      if (!usuario) window.location.href = "login.html";

      document.getElementById("nomeSidebar").textContent = usuario.nome;
      document.getElementById("cursoSidebar").textContent = usuario.nomeCurso || "";
      document.getElementById("avatarSidebar").textContent = usuario.nome[0].toUpperCase();

      function sair() {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
      }

      let semestres = [];
      let filtroAtivo = "todas";

      // MOTOR DE PRÉ-REQUISITOS - Mapeamento da UFPEL (Ciência da Computação)
      const MAPA_PREREQUISITOS = {
        // === SEMESTRE 2 ===
        "22000296": ["22000294"], // Programação de Computadores <- Algoritmos e Programação
        "11100059": ["11100058"], // Cálculo 2 <- Cálculo 1

        // === SEMESTRE 3 ===
        "22000197": ["22000293"], // Linguagens Formais <- Sistemas Discretos
        "22000201": ["22000296"], // Prog. Orientada a Objetos <- Programação de Computadores
        "22000297": ["22000296", "22000295"], // Alg. e Est. Dados I <- Prog. Comp. + Análise Combinatória
        "22000181": ["22000296", "22000211"], // Arq. e Org. de Comp I <- Prog. Comp. + Técnicas Digitais

        // === SEMESTRE 4 ===
        "22000205": ["22000197"], // Teoria da Computação <- Linguagens Formais
        "22000299": ["22000297"], // Alg. e Est. Dados II <- Alg. e Est. Dados I
        "22000182": ["22000181"], // Arq. e Org. de Comp II <- Arq. e Org. de Comp I
        "22000298": ["11100059"], // Estatística Básica <- Cálculo 2

        // === SEMESTRE 5 ===
        "22000300": ["22000299"], // Alg. e Est. Dados III <- Alg. e Est. Dados II
        "22000270": ["22000299", "22000182"], // Sistemas Operacionais <- Alg. e Est. Dados II + Arq. II
        "22000237": ["22000182"], // Programação de Sistemas <- Arq. e Org. de Comp II
        "22000302": ["22000299"], // Projeto de Banco de Dados <- Alg. e Est. Dados II

        // === SEMESTRE 6 ===
        "22000203": ["22000188"], // Semântica Formal <- Conceitos de Linguagens
        "22000187": ["22000300", "11100110"], // Computação Gráfica <- Alg. e Est. Dados III + Álg. Linear
        "22000189": ["22000300"], // Eng. de Software I <- Alg. e Est. Dados III
        "22000273": ["22000270", "22000237"], // Redes de Computadores <- Sist. Operacionais + Prog. Sistemas
        "22000268": ["11100059"], // Cálculo Numérico <- Cálculo 2

        // === SEMESTRE 7 ===
        "22000303": ["22000197"], // Projeto de Compiladores <- Linguagens Formais
        "22000304": ["22000201"], // Desenvolvimento de Softwares <- Prog. Orientada a Objetos
        "22000174": ["22000189"], // Eng. de Software II <- Eng. de Software I
        "22000272": ["22000273"], // Int. Proc. Paralelo e Dist. <- Redes de Computadores
        "22000305": ["22000199"], // Trabalho de Conclusão I <- Met. Científica para Computação

        // === SEMESTRE 8 ===
        "22000306": ["22000305"]  // Trabalho de Conclusão II <- Trabalho de Conclusão I
      };

      // GET /api/progresso/{usuarioId}
      async function carregarFluxograma() {
        try {
          const res = await fetch(`${BASE}/progresso/${usuario.id}`);
          const prog = await res.json();

          if (prog.semestres && prog.semestres.length) {
            document.getElementById("tituloFlux").textContent = `Fluxograma — ${usuario.nomeCurso || "Meu Curso"}`;
          }

          // 1. Criar um inventário com todos os códigos que o aluno JÁ APROVOU
          const codigosAprovados = [];
          prog.semestres.forEach(s => {
            s.disciplinas.forEach(d => {
              if (d.status === "APROVADO") codigosAprovados.push(d.codigo);
            });
          });

          // 2. Mapear os status aplicando a lógica de bloqueio
          semestres = prog.semestres.map((s) => ({
            nome: `SEM ${s.semestre}`,
            disciplinas: s.disciplinas.map((d) => {

              let classeVisual = "liberado"; // Por padrão, está liberada

              if (d.status === "APROVADO") {
                classeVisual = "aprovado";
              } else {
                // Checa se a disciplina possui exigências no nosso mapa
                const prereqs = MAPA_PREREQUISITOS[d.codigo];
                if (prereqs) {
                  // Se algum pré-requisito NÃO estiver no inventário de aprovadas, a matéria é bloqueada
                  const estaTrancada = prereqs.some(req => !codigosAprovados.includes(req));
                  if (estaTrancada) {
                    classeVisual = "bloqueado";
                  }
                }
              }

              return {
                id: d.id,
                codigo: d.codigo,
                nome: d.nome,
                cr: d.creditos,
                status: classeVisual,
                statusApi: d.status,
              };
            }),
          }));

          render();
        } catch {
          document.getElementById("fluxArea").innerHTML =
                  '<p style="color:#e53935;font-size:13px;padding:20px;">Erro ao carregar fluxograma. Verifique se a API está rodando.</p>';
        }
      }

      function filtrar(f, btn) {
        filtroAtivo = f;
        document.querySelectorAll(".fbtn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      }

      function render() {
        let ap = 0, li = 0, bl = 0;

        const html = semestres.map((s) => {
          let discs = s.disciplinas;
          if (filtroAtivo === "aprovadas") discs = discs.filter((d) => d.status === "aprovado");
          if (filtroAtivo === "pendentes") discs = discs.filter((d) => d.status !== "aprovado");

          discs.forEach((d) => {
            if (d.status === "aprovado") ap++;
            else if (d.status === "liberado") li++;
            else bl++;
          });

          const discsHTML = discs.map((d) => `
        <div class="disc ${d.status}" ${d.status !== "bloqueado" ? `onclick="toggle(${d.id},'${d.statusApi}')"` : ""}>
          <div class="disc-nome">${d.nome}</div>
          <div class="disc-foot">
            <span class="disc-cod">${d.codigo}</span>
            <span class="disc-cr">${d.cr}</span>
          </div>
        </div>`).join("");

          return `<div class="flux-col"><div class="sem-header">${s.nome}</div>${discsHTML}</div>`;
        }).join("");

        document.getElementById("fluxArea").innerHTML = `<div class="flux-scroll"><div class="flux-grid">${html}</div></div>`;
        document.getElementById("cntAp").textContent = ap;
        document.getElementById("cntLib").textContent = li;
        document.getElementById("cntBl").textContent = bl;
      }

      // PUT /api/progresso/{usuarioId}/{disciplinaId}
      async function toggle(discId, statusAtual) {
        const novoStatus = statusAtual === "APROVADO" ? "PENDENTE" : "APROVADO";
        await fetch(`${BASE}/progresso/${usuario.id}/${discId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: novoStatus }),
        });
        carregarFluxograma();
      }

      carregarFluxograma();
    </script>
  </body>
</html>
