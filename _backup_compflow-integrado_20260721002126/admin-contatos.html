<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompFlow - Contatos Admin</title>
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo">CompFlow</div>
        <div class="sidebar-label">Painel Administrativo</div>
        <nav class="menu">
          <a href="admin-dashboard.html"
            ><i class="fa-solid fa-house"></i> Dashboard</a
          >
          <a href="admin-disciplinas.html"
            ><i class="fa-solid fa-book"></i> Disciplinas</a
          >
          <a href="admin-eventos.html"
            ><i class="fa-regular fa-calendar"></i> Eventos</a
          >
          <a href="admin-contatos.html" class="active"
            ><i class="fa-solid fa-users"></i> Contatos</a
          >
          <a href="admin-curriculos.html"
            ><i class="fa-solid fa-graduation-cap"></i> Currículos</a
          >
          <a href="admin-alunos.html"
            ><i class="fa-solid fa-user-graduate"></i> Alunos</a
          >
        </nav>
        <div class="sidebar-footer">
          <div class="user-box">
            <div class="avatar" id="avatarSidebar">A</div>
            <div class="user-info">
              <h4 id="nomeSidebar">Admin</h4>
              <span>Administrador</span>
            </div>
            <a href="admin-perfil.html"
              ><i
                class="fa-solid fa-gear"
                style="color: white; font-size: 14px"
              ></i
            ></a>
          </div>
          <a href="#" class="logout" onclick="sair()"
            ><i class="fa-solid fa-chevron-left"></i> Sair</a
          >
        </div>
      </aside>

      <main class="content">
        <div class="page-header">
          <div>
            <h1>Contatos</h1>
            <p>Gerencie professores, coordenação e contatos de apoio</p>
          </div>
          <button class="btn-primary" onclick="abrirModal()">
            <i class="fa-solid fa-plus"></i> Novo Contato
          </button>
        </div>

        <div class="card">
          <div class="toolbar">
            <div class="search-wrap">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                type="text"
                id="busca"
                placeholder="Buscar por nome ou cargo..."
                oninput="renderTabela()"
              />
            </div>
            <select
              class="filter-select"
              id="filtroCategoria"
              onchange="renderTabela()"
            >
              <option value="">Todas as categorias</option>
              <option value="DOCENTE">Docente</option>
              <option value="APOIO">Apoio</option>
            </select>
          </div>
          <div class="table-count" id="count"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Categoria</th>
                  <th>Cargo / Função</th>
                  <th>E-mail</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr>
                  <td
                    colspan="5"
                    style="text-align: center; color: #aaa; padding: 30px"
                  >
                    Carregando...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div
      class="modal-overlay hidden"
      id="modalOverlay"
      onclick="fecharSeForaModal(event)"
    >
      <div class="modal">
        <h3 id="modalTitulo">Novo Contato</h3>
        <div
          id="modalAlert"
          style="
            display: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            background: #fde8e8;
            color: #c62828;
          "
        ></div>
        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" id="fNome" placeholder="Nome Completo" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Categoria</label>
            <select id="fCategoria">
              <option value="DOCENTE">Docente</option>
              <option value="APOIO">Apoio</option>
            </select>
          </div>
          <div class="form-group">
            <label>Cargo / Função</label>
            <input
              type="text"
              id="fCargo"
              placeholder="ex: Professor de Algoritmos"
            />
          </div>
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input
            type="email"
            id="fEmail"
            placeholder="email@inf.ufpel.edu.br"
          />
        </div>
        <div class="form-group">
          <label>Departamento (opcional)</label>
          <input
            type="text"
            id="fDepto"
            placeholder="Centro de Desenvolvimento Tecnológico"
          />
        </div>
        <div class="modal-footer">
          <button class="btn-cancel-modal" onclick="fecharModal()">
            Cancelar
          </button>
          <button class="btn-primary" id="btnSalvar" onclick="salvar()">
            Criar
          </button>
        </div>
      </div>
    </div>

    <script>
      const BASE = "http://localhost:8080/api";
      const usuario = JSON.parse(localStorage.getItem("usuario"));
      if (!usuario || usuario.role !== "ADMIN")
        window.location.href = "login.html";

      document.getElementById("nomeSidebar").textContent = usuario.nome;
      document.getElementById("avatarSidebar").textContent =
        usuario.nome[0].toUpperCase();
      function sair() {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
      }

      let contatos = [];
      let editId = null;

      // GET /api/contatos
      async function carregar() {
        try {
          const res = await fetch(`${BASE}/contatos`);
          contatos = await res.json();
          renderTabela();
        } catch {
          document.getElementById("tbody").innerHTML =
            '<tr><td colspan="5" style="color:#e53935;text-align:center;padding:20px;">Erro ao carregar. Verifique se a API está rodando.</td></tr>';
        }
      }

      function renderTabela() {
        const busca = document.getElementById("busca").value.toLowerCase();
        const cat = document.getElementById("filtroCategoria").value;
        let lista = contatos;
        if (busca)
          lista = lista.filter(
            (c) =>
              c.nome.toLowerCase().includes(busca) ||
              (c.cargo || "").toLowerCase().includes(busca),
          );
        if (cat) lista = lista.filter((c) => c.categoria === cat);

        document.getElementById("count").textContent =
          `Lista de Contatos (${lista.length})`;
        document.getElementById("tbody").innerHTML = lista.length
          ? lista
              .map(
                (c) => `
      <tr>
        <td style="font-weight:600;">${c.nome}</td>
        <td><span class="badge badge-${c.categoria.toLowerCase()}">${c.categoria}</span></td>
        <td style="color:#555;">${c.cargo || "—"}</td>
        <td style="color:#555;">${c.email}</td>
        <td><div class="tbl-actions">
          <button class="btn-icon btn-edit" onclick="abrirEditar(${c.id})"><i class="fa-solid fa-pen"></i></button>
          <button class="btn-icon btn-del"  onclick="excluir(${c.id})"><i class="fa-solid fa-trash"></i></button>
        </div></td>
      </tr>`,
              )
              .join("")
          : '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px;">Nenhum contato encontrado.</td></tr>';
      }

      function abrirModal() {
        editId = null;
        document.getElementById("modalTitulo").textContent = "Novo Contato";
        document.getElementById("btnSalvar").textContent = "Criar";
        ["fNome", "fCargo", "fEmail", "fDepto"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        document.getElementById("fCategoria").value = "DOCENTE";
        document.getElementById("modalAlert").style.display = "none";
        document.getElementById("modalOverlay").classList.remove("hidden");
      }

      function abrirEditar(id) {
        const c = contatos.find((x) => x.id === id);
        editId = id;
        document.getElementById("modalTitulo").textContent = "Editar Contato";
        document.getElementById("btnSalvar").textContent = "Salvar";
        document.getElementById("fNome").value = c.nome;
        document.getElementById("fCargo").value = c.cargo || "";
        document.getElementById("fCategoria").value = c.categoria;
        document.getElementById("fEmail").value = c.email;
        document.getElementById("fDepto").value = c.departamento || "";
        document.getElementById("modalAlert").style.display = "none";
        document.getElementById("modalOverlay").classList.remove("hidden");
      }

      function fecharModal() {
        document.getElementById("modalOverlay").classList.add("hidden");
      }
      function fecharSeForaModal(e) {
        if (e.target === e.currentTarget) fecharModal();
      }

      // POST /api/contatos  ou  PUT /api/contatos/{id}
      async function salvar() {
        const nome = document.getElementById("fNome").value.trim();
        const cargo = document.getElementById("fCargo").value.trim();
        const categoria = document.getElementById("fCategoria").value;
        const email = document.getElementById("fEmail").value.trim();
        const depto = document.getElementById("fDepto").value.trim() || null;

        if (!nome || !email) {
          const al = document.getElementById("modalAlert");
          al.textContent = "Nome e e-mail são obrigatórios.";
          al.style.display = "block";
          return;
        }

        const btn = document.getElementById("btnSalvar");
        btn.disabled = true;
        btn.textContent = "Salvando...";

        try {
          const url = editId
            ? `${BASE}/contatos/${editId}`
            : `${BASE}/contatos`;
          const method = editId ? "PUT" : "POST";
          const res = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              nome,
              cargo,
              categoria,
              email,
              departamento: depto,
            }),
          });
          if (!res.ok) throw new Error();
          fecharModal();
          carregar();
        } catch {
          const al = document.getElementById("modalAlert");
          al.textContent = "Erro ao salvar. Tente novamente.";
          al.style.display = "block";
        } finally {
          btn.disabled = false;
          btn.textContent = editId ? "Salvar" : "Criar";
        }
      }

      // DELETE /api/contatos/{id}
      async function excluir(id) {
        if (!confirm("Excluir este contato?")) return;
        await fetch(`${BASE}/contatos/${id}`, { method: "DELETE" });
        carregar();
      }

      carregar();
    </script>
  </body>
</html>
