services:
  app:
    build: ./compflow-java
    container_name: compflow-backend
    ports:
      - "8080:8080"
    environment:
      # Aponta direto pro banco remoto do Aiven — não usa mais o
      # container local "db". A senha vem do arquivo .env (não versionado).
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-32b6936c-inf-3c7b.l.aivencloud.com:17991/defaultdb?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    restart: unless-stopped
